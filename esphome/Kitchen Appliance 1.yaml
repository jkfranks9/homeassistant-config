# Device specific information
substitutions:
  friendly_name: Kitchen Appliance 1
  
  # Used by boards
  device_name: kitchen-appliance-1
  
  # Used by WiFi
  update_interval: 600s

# Pull in common configuration
packages:
  esp12e: !include common/esp12e_base.yaml
  wifi:   !include common/wifi.yaml
  sonoff: !include common/sonoff_plug.yaml

# Enable Home Assistant API
api:
  encryption:
    key: !secret kitchen_appliance_1_api_key

# WiFi credentials & LED commands
wifi:
  ssid:     !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - light.turn_off: StatusLED
  on_disconnect:
    - light.turn_on: StatusLED
