# Device specific information
substitutions:
  friendly_name: Microwave
  
  # Used by boards
  device_name: microwave
  
  # Used by WiFi
  update_interval: 600s

# Pull in common configuration
packages:
  esp12e: !include common/esp12e_base.yaml
  wifi:   !include common/wifi.yaml
  sonoff: !include common/sonoff_plug.yaml

# WiFi credentials & LED commands
wifi:
  ssid:     !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - light.turn_off: StatusLED
  on_disconnect:
    - light.turn_on: StatusLED

# Enable Home Assistant API
api:
  encryption:
    key: !secret microwave_api_key

# Device Specific Config
uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

switch:
  - platform: gpio
    name: None
    pin: GPIO12
    id: relay
    #restore_mode: ALWAYS_OFF # Use when flashing using a programmer
    restore_mode: RESTORE_DEFAULT_OFF # Use when flashing using OTA

light:
  - platform: status_led
    name: "LED"
    id: StatusLED
    pin:
      number: GPIO13
      inverted: true