# Device specific information
substitutions:
  friendly_name: Kitchen Appliance 3
  
  # Used by WiFi
  update_interval: 600s

# Basic Config
esphome:
  name: kitchen-appliance-3
  friendly_name: $friendly_name

esp8266:
  board: esp12e
  early_pin_init: false
  #restore_from_flash: false # Set to true to use one of the switch's RESTORE_X restore_mode options
  restore_from_flash: true

# Pull in common configuration
packages:
  wifi: !include common/wifi.yaml

# WiFi credentials
wifi:
  ssid:     !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - light.turn_off: StatusLED
  on_disconnect:
    - light.turn_on: StatusLED

# Remove the following line if you're not using Home Assistant or your switch will restart every now and again
api:
  encryption:
    key: !secret kitchen_appliance_3_api_key

ota:
  platform: esphome

# Device Specific Config

logger:
  baud_rate: 0 # (UART logging interferes with cse7766)
  logs:
    sensor: DEBUG # (Overide any global setting, to VERBOSE will spamming the cse7766 sensors)

uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Button"
    on_press:
      - switch.toggle: relay
  - platform: status
    name: "Status"

sensor:
  - platform: cse7766
    current:
      name: "Current"
      accuracy_decimals: 2
      filters:
        - throttle_average: 60s
    voltage:
      name: "Voltage"
      accuracy_decimals: 2
      filters:
        - throttle_average: 60s
    power:
      name: "Power"
      accuracy_decimals: 2
      id: my_power
      filters:
        - throttle_average: 60s
    # energy:
      # name: "Energy"
      # accuracy_decimals: 2
      # filters:
        # - throttle: 60s
    # apparent_power: #(only available with version 2024.3.0 or greater)
      # name: "Apparent Power"
      # filters:
        # - throttle_average: 60s
    # power_factor: #(only available with version 2024.3.0 or greater)
      # name: "Power Factor"
      # accuracy_decimals: 2
      # filters:
        # - throttle_average: 60s

  - platform: total_daily_energy #(Optional, not specific to cse7766)
    name: "Daily Energy"
    power_id: my_power
    accuracy_decimals: 2

switch:
  - platform: gpio
    name: "Relay"
    pin: GPIO12
    id: relay
    #restore_mode: ALWAYS_OFF # Powering the relay may cause damage or instability when the programmer is supplying Vcc.
    restore_mode: RESTORE_DEFAULT_OFF

time:
  - platform: sntp #(required for total_daily_energy)
    id: my_time

# status_led:
  # pin:
    # number: GPIO13
    # inverted: True

light:
  - platform: status_led
    name: "LED"
    id: StatusLED
    pin:
      number: GPIO13
      inverted: true