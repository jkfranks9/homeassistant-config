#===============#
#     Voice     #
#===============#

# NOTE: These intents require knowing the most recently spoken to device. So all intent scripts must call a script
# that in turn calls Get Voice Device Data as the first step.

intents:
  
  Bedtime:
    data:
      - sentences:
          - "(bedtime | bed time | time for bed)"

  FanHigh:
    data:
      - sentences:
          - "([(set the | set)] fan high | tea earl grey hot | (I am | I'm | it is | it's) very hot)"

  FanLow:
    data:
      - sentences:
          - "([(set the | set)] fan low | tea earl grey cool | (I am | I'm | it is | it's) [too] warm)"

  FanMedium:
    data:
      - sentences:
          - "([(set the | set)] fan medium | tea earl grey lukewarm | (I am | I'm | it is | it's) [too] hot)"

  FanOff:
    data:
      - sentences:
          - "([(turn the | turn)] fan off | (I am | I'm | it is | it's) [too] (cold | cool | chilly))"

  LightOff:
    data:
      - sentences:
          - "[(turn the | turn)] (light | lamp) off"

  LightOn:
    data:
      - sentences:
          - "[(turn the | turn)] (light | lamp) on"

  RemoveNotification:
    data:
      - sentences:
          - "remove notification"

  ReportHouseStatus:
    data:
      - sentences:
          - "status report"
