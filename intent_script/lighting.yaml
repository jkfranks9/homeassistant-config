#==================#
#     Lighting     #
#==================#

KitchenBright:
  action:
    - action: script.turn_on_bright_kitchen_lights

KitchenOff:
  action:
    - action: script.turn_off_kitchen_lights

KitchenOn:
  action:
    - action: script.turn_on_kitchen_lights

LightsOut:
  action:
    - action: light.turn_off
      target:
        label_id:
          - non_bedroom_lights
          - bedroom_lights
          - family_room_lights
          - kitchen_lights
    
    - action: script.turn_off_fan_lights
      data:
        light_entity: "{{ expand(state_attr('light.ceiling_fan_lights', 'entity_id')) | map(attribute = 'entity_id') | list }}"

PauseSleep:
  action:
    - action: script.temporarily_pause_sleep

SleepTime:
  action:
    - action: script.sleeptime

StartBathTime:
  action:
    - action: script.start_bath_time

TurnOffChristmasLights:
  action:
    - action: script.turn_off_christmas_lights

TurnOnChristmasLights:
  action:
    - action: script.turn_on_christmas_lights
