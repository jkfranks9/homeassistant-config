#---------------------------#
#   -- Calendar Events --   #
#---------------------------#

# This is a list of calendar events for today.
- triggers:
    
    # Trigger early in the morning (this is the normal expected trigger).
    - trigger: time
      at: '05:00:00'
    
    # Trigger at HA start, just in case something has changed.
    - trigger: homeassistant
      event: start

    # Trigger when templates are reloaded, to pick up any changes here.
    - trigger: event
      event_type: event_template_reloaded

    # Trigger if the calendar changes.
    - trigger: state
      entity_id: calendar.calendar
  
  actions:
    
    # Grab calendar events for 24 hours, starting early in the morning. I can't use now() because of the multiple triggers, 
    # so keep the start time here in sync with the first trigger. The idea is to get a list of events for the current day and 
    # overnight, to cover any astronomy events in the middle of the night.
    - action: calendar.get_events
      target:
        entity_id: calendar.calendar
      data:
        start_date_time: "{{ today_at('05:00').strftime('%Y-%m-%d %H:%M') }}"
        duration:
          days: 1
      response_variable: agenda

    - variables:
        events: "{{ agenda['calendar.calendar']['events'] }}"
  
  sensor:
    - name: "Upcoming Events"
      unique_id: upcoming_events
      icon: mdi:calendar-star
      state: "{{ this.events | count }}"
      
      attributes:
        events: >
          {% set ns = namespace(events = []) %}
          {% set today_date = now() | as_timestamp | timestamp_custom('%m/%d') %}
          {% for event in events %}
            {% set event_date = event.start | as_timestamp | timestamp_custom('%m/%d') %}
            {% set day_str = iif(event_date == today_date, 'Today at ', 'Tomorrow at ') %}
            {% if event.summary | contains('(appt') or event.summary | contains('(home') or event.summary | contains('(astro') %}
              {% set ns.events = ns.events + [day_str ~ event.start | as_timestamp | timestamp_custom('%-I:%M %p') ~ ': ' ~ event.summary] %}
            {% endif %}
          {% endfor %}
          
          {{ ns.events }}

#---------------------------#
#   -- Pending Updates --   #
#---------------------------#

- triggers:
    - trigger: event
      event_type: add_pending_update
  
    - trigger: event
      event_type: remove_pending_update
    
    - trigger: event
      event_type: reset_pending_updates
  
  sensor:
    - name: Pending Updates
      unique_id: pending_updates
      state: Updates
      
      attributes:
        items: >
          {% set ns = namespace(current = this.attributes.get('items', []), new = []) %}
          {% if trigger.event.event_type == 'add_pending_update' %}
            {% if not ns.current | contains(trigger.event.data.value) %}
              {% set ns.current = ns.current + [trigger.event.data.value] %}
            {% endif %}
          {% elif trigger.event.event_type == 'remove_pending_update' %}
            {% set idx = ns.current.index(trigger.event.data.value) %}
            {% for item in ns.current %}
              {% if loop.index0 != idx %}
                {% set ns.new = ns.new + [item] %}
              {% endif %}
            {% endfor %}
            {% set ns.current = ns.new %}
          {% elif trigger.event.event_type == 'reset_pending_updates' %}
            {% set ns.current = [] %}
          {% endif %}
          
          {{ ns.current }}

#---------- Normal Sensors ----------#

- sensor:

    #------------------#
    #   -- Hockey --   #
    #------------------#

    - name: 'Canes Game Status'
      unique_id: canes_game_status
      state: >
        {% if states.sensor.next_canes_game is defined and states.sensor.next_canes_game.attributes is defined and states.sensor.next_canes_game.attributes.homeTeam is defined %}
          {{ iif(state_attr('sensor.next_canes_game', 'homeTeam')['abbrev'] == 'CAR', 'Home', 'Away') }}
        {% else %}
          Unknown
        {% endif %}
      
      attributes:
        tv_networks: >
          {% set vars = namespace(tv = []) %}
          {% if states.sensor.next_canes_game is defined and states.sensor.next_canes_game.attributes is defined and states.sensor.next_canes_game.attributes.tvBroadcasts is defined %}
            {% for network in state_attr('sensor.next_canes_game', 'tvBroadcasts') %}
              {% if network['countryCode'] == 'US' and network['network'] == 'HBO MAX' %}
                {% set vars.tv = vars.tv + ['HBO'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'ESPN' %}
                {% set vars.tv = vars.tv + ['ESPN'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'ESPN+' %}
                {% set vars.tv = vars.tv + ['ESPN+'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'TNT' %}
                {% set vars.tv = vars.tv + ['TNT'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'HULU' %}
                {% set vars.tv = vars.tv + ['Hulu'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'FDSNSO' %}
                {% set vars.tv = vars.tv + ['FanDuel'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'ABC' %}
                {% set vars.tv = vars.tv + ['ABC'] %}
              {% endif %}
            {% endfor %}
          {% else %}
            {% set vars.tv = ['Unknown'] %}
          {% endif %}
          
          {{ vars.tv }}

    - name: 'Canes Opponent'
      unique_id: canes_opponent
      state: >
        {% if states('sensor.canes_game_status') == 'Home' %}
          {{ state_attr('sensor.next_canes_game', 'awayTeam')['abbrev'] }}
        {% elif states('sensor.canes_game_status') == 'Away' %}
          {{ state_attr('sensor.next_canes_game', 'homeTeam')['abbrev'] }}
        {% else %}
          Unknown
        {% endif %}
      
      attributes:
        friendly_opponent: >
          {% set vars = namespace(name = 'Unknown') %}
          
          {% set abbrev = this.state %}
          {% for team in state_attr('sensor.nhl_team_abbrev', 'abbrev') %}
            {% if team == abbrev %}
              {% set vars.name = state_attr('sensor.nhl_team_names', 'names')[loop.index0] %}
              {% break %}
            {% endif %}
          {% endfor %}
          
          {{ vars.name }}

    - name: 'Flyers Game Status'
      unique_id: flyers_game_status
      state: >
        {% if states.sensor.next_flyers_game is defined and states.sensor.next_flyers_game.attributes is defined and states.sensor.next_flyers_game.attributes.homeTeam is defined %}
          {{ iif(state_attr('sensor.next_flyers_game', 'homeTeam')['abbrev'] == 'PHI', 'Home', 'Away') }}
        {% else %}
          Unknown
        {% endif %}
      
      attributes:
        tv_networks: >
          {% set vars = namespace(tv = []) %}
          {% if states.sensor.next_flyers_game is defined and states.sensor.next_flyers_game.attributes is defined and states.sensor.next_flyers_game.attributes.tvBroadcasts is defined %}
            {% for network in state_attr('sensor.next_flyers_game', 'tvBroadcasts') %}
              {% if network['countryCode'] == 'US' and network['network'] == 'HBO MAX' %}
                {% set vars.tv = vars.tv + ['HBO'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'ESPN' %}
                {% set vars.tv = vars.tv + ['ESPN'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'ESPN+' %}
                {% set vars.tv = vars.tv + ['ESPN+'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'TNT' %}
                {% set vars.tv = vars.tv + ['TNT'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'HULU' %}
                {% set vars.tv = vars.tv + ['Hulu'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'FDSNSO' %}
                {% set vars.tv = vars.tv + ['FanDuel'] %}
              {% elif network['countryCode'] == 'US' and network['network'] == 'ABC' %}
                {% set vars.tv = vars.tv + ['ABC'] %}
              {% endif %}
            {% endfor %}
          {% else %}
            {% set vars.tv = ['Unknown'] %}
          {% endif %}
          
          {{ vars.tv }}

    - name: 'Flyers Opponent'
      unique_id: flyers_opponent
      state: >
        {% if states('sensor.flyers_game_status') == 'Home' %}
          {{ state_attr('sensor.next_flyers_game', 'awayTeam')['abbrev'] }}
        {% elif states('sensor.flyers_game_status') == 'Away' %}
          {{ state_attr('sensor.next_flyers_game', 'homeTeam')['abbrev'] }}
        {% else %}
          Unknown
        {% endif %}
      
      attributes:
        friendly_opponent: >
          {% set vars = namespace(name = 'Unknown') %}
          
          {% set abbrev = this.state %}
          {% for team in state_attr('sensor.nhl_team_abbrev', 'abbrev') %}
            {% if team == abbrev %}
              {% set vars.name = state_attr('sensor.nhl_team_names', 'names')[loop.index0] %}
