virtual_device_trackers:
  name: Virtual Device Trackers
  entities:
    - input_boolean.virtual_mike
    - input_boolean.virtual_maryam
    - input_boolean.virtual_sarah
    - input_boolean.virtual_david
    - input_boolean.virtual_skylar
